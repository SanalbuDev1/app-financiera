spring.application.name=finanzas

# =============================================
# BASE DE DATOS — Azure PostgreSQL Flexible Server (R2DBC)
# Perfil "desarrollo" para despliegue en Azure (free tier 12 meses)
# Se sobreescriben con variables de entorno en Azure Container Apps
# =============================================
spring.r2dbc.url=${SPRING_R2DBC_URL}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD}
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5
spring.r2dbc.pool.max-idle-time=5m
spring.r2dbc.pool.max-life-time=15m

# =============================================
# JWT — secret DEBE venir de variable de entorno
# =============================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# =============================================
# CORS — permitir frontend en desarrollo (Azure Static Web App + localhost)
# =============================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# =============================================
# WEBFLUX
# =============================================
spring.webflux.base-path=/
server.port=9000

# =============================================
# LOGGING — más verbose para depuración en Azure
# =============================================
logging.level.com.finanzas.personales=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
