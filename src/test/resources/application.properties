spring.application.name=finanzas-test

# R2DBC — H2 en memoria para tests
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

# JWT
app.jwt.secret=clave-secreta-finanzas-personales-2026-cambiar-en-produccion
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Puerto aleatorio para tests
server.port=0

# Deshabilitar init SQL en tests
spring.sql.init.mode=never
